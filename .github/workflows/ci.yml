name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    outputs:
      result:
        description: "CI result (success or failure)"
        value: ${{ jobs.lint-test.result }}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint + Test + Coverage ──────────────────────────────────────────────
  lint-test:
    name: Lint · Test · Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      FLASK_ENV: development
      TESTING: "1"
      SECRET_KEY: ci-test-secret

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint (real bugs + bugbear)
        # E9   — syntax errors (blocking)
        # F63  — invalid star imports
        # F7   — syntax warnings
        # F82  — undefined names
        # F401 — unused imports
        # F811 — redefined-while-unused
        # B    — flake8-bugbear (likely-bug patterns)
        run: |
          ruff check . \
            --select E9,F63,F7,F82,F401,F811,B \
            --statistics

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest with coverage
        run: |
          pytest -q \
            --tb=short \
            --cov=app \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=0

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ── 2. Type checking ───────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: mypy (non-blocking — surface type errors)
        # continue-on-error lets CI stay green while we work through existing
        # type gaps. Remove once the error count reaches zero.
        continue-on-error: true
        run: |
          mypy app \
            --ignore-missing-imports \
            --no-error-summary \
            --show-column-numbers \
            --pretty \
            2>&1 | tee mypy-report.txt
          echo "mypy exit: $?"

      - name: Upload mypy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mypy-report
          path: mypy-report.txt
          retention-days: 14

  # ── 3. SAST — Bandit ──────────────────────────────────────────────────────
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Bandit
        run: pip install "bandit[toml]~=1.8.0"

      - name: Run Bandit SAST scan
        # HIGH severity (-lll) blocks CI. MEDIUM findings are reported but
        # do not fail the build yet — triage them via bandit-report.json first.
        run: |
          bandit -r app admin lib_*.py \
            --format json \
            --output bandit-report.json \
            --exit-zero

          python3 - <<'EOF'
          import json, sys
          try:
              data = json.load(open("bandit-report.json"))
          except Exception as e:
              print(f"Could not parse bandit-report.json: {e}")
              sys.exit(0)

          results = data.get("results", [])
          high = [r for r in results if r.get("issue_severity") == "HIGH"]
          medium = [r for r in results if r.get("issue_severity") == "MEDIUM"]

          for r in medium:
              print(f"MEDIUM  {r['filename']}:{r['line_number']} — {r['issue_text']}")
          for r in high:
              print(f"HIGH    {r['filename']}:{r['line_number']} — {r['issue_text']}")

          if medium:
              print(f"\n{len(medium)} MEDIUM finding(s) — please review and triage.")
          if high:
              print(f"\n{len(high)} HIGH-severity finding(s) detected — failing build.")
              sys.exit(1)
          else:
              print("No HIGH-severity findings.")
          EOF

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ── 4. Dependency audit (BLOCKING on HIGH/CRITICAL CVEs) ──────────────────
  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit~=2.7.0

      - name: Audit runtime dependencies (BLOCKING)
        # Any known CVE in requirements.txt now fails the build.
        # To accept a triaged false-positive use:
        #   pip-audit -r requirements.txt --ignore-vuln VULN-ID
        # Document the reason in a comment here.
        run: pip-audit -r requirements.txt --strict

      - name: Audit dev dependencies (non-blocking)
        continue-on-error: true
        run: pip-audit -r requirements-dev.txt --strict

  # ── 5. Docker build smoke-test ────────────────────────────────────────────
  docker-build:
    name: Docker build smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: |
          docker build \
            --file Dockerfile \
            --tag cafe-ordering:ci \
            .
          echo "Docker build succeeded"

      - name: Verify image starts cleanly (factory smoke-test)
        run: |
          docker run --rm \
            -e SECRET_KEY=ci-smoke-secret \
            -e TESTING=1 \
            -e FLASK_ENV=development \
            --entrypoint python3 \
            cafe-ordering:ci \
            -c "from app import create_app; app = create_app(); print('App factory OK')"
