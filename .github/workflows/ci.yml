name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      FLASK_ENV: development
      TESTING: "1"
      SECRET_KEY: ci-test-secret
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        # Non-fatal at first — surface issues without blocking deploys until
        # the codebase is clean. Flip to `--exit-non-zero-on-fix` once green.
        run: ruff check . || true

      - name: Pytest
        run: pytest -q

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit~=2.7.0

      - name: Audit runtime dependencies
        # Don't fail the build on advisories yet — make them visible first so
        # we have a chance to triage. Remove `|| true` to make CVEs blocking.
        run: pip-audit -r requirements.txt --strict || true
