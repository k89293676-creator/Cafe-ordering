version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      flask-stack:
        patterns:
          - "Flask*"
          - "Werkzeug"
          - "gunicorn"
          - "gevent"
      data-stack:
        patterns:
          - "SQLAlchemy"
          - "Flask-SQLAlchemy"
          - "Flask-Migrate"
          - "psycopg2-binary"
          - "pandas"
      security-stack:
        patterns:
          - "Flask-Talisman"
          - "Flask-WTF"
          - "Flask-Bcrypt"
          - "Flask-Limiter"
          - "cryptography"
          - "pyotp"
      observability:
        patterns:
          - "sentry-sdk*"
          - "prometheus-client"
          - "psutil"
      dev-tooling:
        patterns:
          - "pytest*"
          - "ruff"
          - "bandit*"
          - "pip-audit"
          - "mypy"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      actions-core:
        patterns:
          - "actions/*"
      security-actions:
        patterns:
          - "github/codeql-action*"
          - "aquasecurity/trivy-action*"
          - "gitleaks/gitleaks-action*"
