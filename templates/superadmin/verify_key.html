<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Superadmin Key — CafePortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background:#1a1d21; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:#fff; border-radius:1rem; padding:2.5rem 2rem; width:100%; max-width:420px; box-shadow:0 25px 50px rgba(0,0,0,.4); }
    .icon { width:3rem; height:3rem; background:#ef4444; border-radius:.75rem; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.4rem; margin-bottom:1.25rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><i class="bi bi-shield-exclamation"></i></div>
    <h5 class="fw-bold mb-1">Superadmin Verification</h5>
    <p class="text-muted mb-3" style="font-size:.9rem;">
      Accessing superadmin controls requires the <code>SUPERADMIN_KEY</code>
      configured on this server. Please enter it to confirm changes.
    </p>

    {% if error %}
    <div class="alert alert-danger py-2" style="font-size:.88rem;">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('superadmin_verify_key') }}">
      {% if csrf_token is defined %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      {% endif %}
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:.88rem;">SUPERADMIN_KEY</label>
        <input type="password" name="key" class="form-control" placeholder="••••••••••••" autofocus required autocomplete="off"/>
      </div>
      <button type="submit" class="btn w-100 text-white" style="background:#ef4444;border-color:#ef4444;">
        <i class="bi bi-unlock me-1"></i> Verify &amp; Continue
      </button>
      <a href="{{ url_for('admin.dashboard') }}" class="btn btn-link w-100 mt-2 text-muted" style="font-size:.85rem;">
        Back to Admin Dashboard
      </a>
    </form>
  </div>
</body>
</html>
