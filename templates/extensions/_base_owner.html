<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Cafe 11:11{% endblock %}</title>
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="stylesheet" href="/static/css/enhancements.css" />
  <link rel="stylesheet" href="/static/css/reports-pro.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --ink: #0f172a;
      --ink-2: #1e293b;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --line: #e5e7eb;
      --line-2: #d3d7e2;
      --surface: #ffffff;
      --surface-2: #fafbfd;
      --bg: #f6f7fb;
      --primary: #4f46e5;
      --primary-2: #7c3aed;
      --primary-soft: #eef2ff;
      --ok: #15803d;
      --ok-soft: #dcfce7;
      --warn: #a16207;
      --warn-soft: #fef3c7;
      --info: #1d4ed8;
      --info-soft: #dbeafe;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --space-1: .35rem;
      --space-2: .6rem;
      --space-3: 1rem;
      --space-4: 1.25rem;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, .05);
      --shadow-md: 0 8px 24px -14px rgba(15, 23, 42, .18);
      --shadow-lg: 0 20px 45px -18px rgba(15, 23, 42, .28);
      --ring: 0 0 0 3px rgba(79, 70, 229, .16);
    }
    * { box-sizing: border-box; }
    ::selection { background: var(--primary-soft); color: var(--primary); }
    :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 4px; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(1100px 480px at 100% -8%, rgba(79, 70, 229, .06), transparent 60%),
        radial-gradient(900px 420px at -8% 0%, rgba(124, 58, 237, .05), transparent 55%),
        var(--bg);
      color: var(--ink); margin:0; -webkit-font-smoothing:antialiased;
    }
    .ext-shell { max-width: 1280px; margin: 0 auto; padding: 1.5rem; }
    .ext-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; flex-wrap:wrap; gap:.75rem;}
    .ext-header h1 { font-size: 1.4rem; margin:0; letter-spacing:-.01em; font-weight: 800; color: var(--ink); }
    .ext-header a.back { color: var(--primary); text-decoration:none; font-weight:600; font-size:.85rem; }
    .ext-filter { display:flex; gap:.6rem; flex-wrap:wrap; align-items:flex-end; background: var(--surface); border:1px solid var(--line); border-radius: var(--radius-lg); padding:.85rem 1rem; margin-bottom:1rem; }
    .ext-filter .f { display:flex; flex-direction:column; gap:.25rem; }
    .ext-filter label { font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; color: var(--muted); font-weight:600;}
    .ext-filter input,.ext-filter select { padding:.45rem .65rem; border:1px solid var(--line-2); border-radius: var(--radius-sm); font-size:.85rem; min-width:140px; background: var(--surface); color: var(--ink); }
    .ext-filter button { background: var(--ink); color:#fff; border:0; border-radius: var(--radius-sm); padding:.55rem 1rem; font-weight:600; cursor:pointer; font-size:.85rem; }
    .ext-grid { display:grid; gap:1rem; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); margin-bottom:1.25rem;}
    .kpi { background: var(--surface); border:1px solid var(--line); border-radius: var(--radius-lg); padding:1rem 1.1rem;}
    .kpi-label { font-size:.7rem; color: var(--muted); text-transform:uppercase; letter-spacing:.05em; font-weight:700;}
    .kpi-value { font-size:1.7rem; font-weight:800; margin-top:.3rem; line-height:1; color: var(--ink); }
    .kpi-sub { font-size:.75rem; color: var(--muted); margin-top:.25rem;}
    .card { background: var(--surface); border:1px solid var(--line); border-radius: var(--radius-lg); padding:1.25rem; margin-bottom:1rem; box-shadow: var(--shadow-sm);}
    .card h3 { margin:0 0 .85rem; font-size:1rem; font-weight:700; color: var(--ink); }
    .chart-wrap { position:relative; height:300px;}
    table.dt { width:100%; border-collapse:collapse; font-size:.85rem;}
    table.dt th, table.dt td { padding:.55rem .6rem; border-bottom:1px solid var(--surface-2); text-align:left;}
    table.dt th { font-size:.68rem; text-transform:uppercase; color: var(--muted); letter-spacing:.08em; font-weight:700; background: var(--surface-2); padding:.7rem .65rem !important;}
    .badge { display:inline-block; padding:.15rem .55rem; border-radius:999px; font-size:.7rem; font-weight:700; text-transform:uppercase;}
    .b-star { background: var(--ok-soft); color: var(--ok);}
    .b-plowhorse { background: var(--warn-soft); color: var(--warn);}
    .b-puzzle { background: var(--info-soft); color: var(--info);}
    .b-dog { background: var(--danger-soft); color: var(--danger);}
    .empty { color: var(--muted-2); text-align:center; padding:1.5rem; font-size:.85rem;}
  </style>
</head>
<body>
<div class="ext-shell">
  <div class="ext-header">
    <h1>{% block heading %}{% endblock %}</h1>
    <a class="back" href="{{ url_for('web_owner.owner_dashboard') }}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:.2rem;"><polyline points="15 18 9 12 15 6"/></svg>Dashboard</a>
  </div>
  {% block body %}{% endblock %}
</div>
</body>
</html>
