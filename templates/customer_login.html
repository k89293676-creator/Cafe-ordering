<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token() }}" />
  <title>Customer Login</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--surface-alt,#f3f4f6);padding:1rem;}
    .auth-card{background:#fff;border-radius:1.25rem;box-shadow:0 8px 32px rgba(15,23,42,.12);padding:2.5rem 2rem;width:100%;max-width:420px;}
    .auth-card h1{margin:0 0 .25rem;font-size:1.5rem;font-weight:700;color:#0f172a;}
    .auth-card p{margin:0 0 1.5rem;color:#6b7280;font-size:.9rem;}
    .field{margin-bottom:1rem;}
    .field label{display:block;font-size:.875rem;font-weight:600;color:#374151;margin-bottom:.35rem;}
    .field input{width:100%;padding:.7rem 1rem;border:1.5px solid #e5e7eb;border-radius:.65rem;font-size:.95rem;outline:none;box-sizing:border-box;}
    .field input:focus{border-color:var(--primary,#4f46e5);}
    .btn-primary{width:100%;padding:.8rem;background:var(--primary,#4f46e5);color:#fff;border:0;border-radius:.75rem;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.5rem;}
    .btn-primary:hover{opacity:.9;}
    .flash{padding:.65rem 1rem;border-radius:.6rem;font-size:.875rem;margin-bottom:1rem;}
    .flash.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
    .flash.success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
    .auth-footer{margin-top:1.25rem;text-align:center;font-size:.875rem;color:#6b7280;}
    .auth-footer a{color:var(--primary,#4f46e5);font-weight:600;text-decoration:none;}
  </style>
</head>
<body>
<div class="auth-card">
  <h1>Customer Login</h1>
  <p>Sign in to view your order history</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="post" action="{{ url_for('customers.customer_login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{ email }}" autocomplete="email" placeholder="you@example.com" required />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••" required />
    </div>
    <button type="submit" class="btn-primary">Sign In</button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="{{ url_for('customers.customer_register') }}">Create one</a>
  </div>
</div>
</body>
</html>
