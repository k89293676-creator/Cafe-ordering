<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Error</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <style>
    body { background: #1a1d21; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .err-card { background: #fff; border-radius: 1rem; padding: 2.5rem 2rem; max-width: 420px; text-align: center; }
  </style>
  <link rel="stylesheet" href="/static/css/enhancements.css" />
</head>
<body>
  <div class="err-card">
    <div style="font-size:3rem;">⚠️</div>
    <h5 class="mt-2 fw-700">Configuration Error</h5>
    <p class="text-muted">{{ message }}</p>
    <p class="text-muted" style="font-size:.82rem;">Set <code>ADMIN_SECRET_KEY</code> in your environment and restart the server.</p>
  </div>
</body>
</html>
