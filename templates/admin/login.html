<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Cafe Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    body { background: #1a1d21; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 1rem; padding: 2.5rem 2rem; width: 100%; max-width: 380px; box-shadow: 0 25px 50px rgba(0,0,0,.4); }
    .login-icon { width: 3rem; height: 3rem; background: #6366f1; border-radius: .75rem; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.4rem; margin-bottom: 1.25rem; }
  </style>
  <link rel="stylesheet" href="/static/css/enhancements.css" />
</head>
<body>
  <div class="login-card">
    <div class="login-icon"><i class="bi bi-shield-lock"></i></div>
    <h5 class="fw-700 mb-1">Admin Access</h5>
    <p class="text-muted mb-3" style="font-size:.88rem;">Enter the admin secret key to continue.</p>

    {% if error %}
    <div class="alert alert-danger py-2" style="font-size:.88rem;">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="mb-3">
        <label class="form-label fw-500" style="font-size:.88rem;">Admin Key</label>
        <input type="password" name="key" class="form-control" placeholder="••••••••••••" autofocus required/>
      </div>
      <button type="submit" class="btn btn-primary w-100" style="background:#6366f1;border-color:#6366f1;">
        <i class="bi bi-unlock me-1"></i> Sign In
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
