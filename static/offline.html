<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Cafe 11:11</title>
  <style>
    :root { --gold: #4f46e5; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #faf8f4;
      color: #1c1c1e;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: .8;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: .75rem;
    }
    p {
      color: #6b7280;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: .75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="icon">☕</div>
  <h1>You're offline</h1>
  <p>It looks like you've lost your internet connection. Your order has been saved and will be sent as soon as you're back online.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
