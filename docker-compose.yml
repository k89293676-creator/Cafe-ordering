services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DATABASE_URL: postgresql://cafe:cafe@db:5432/cafe_ordering
      SECRET_KEY: change-me-in-production
      ADMIN_SECRET_KEY: change-me-in-production
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      STRIPE_PUBLISHABLE_KEY: ""
      MAIL_SERVER: smtp.sendgrid.net
      MAIL_PORT: 587
      MAIL_USE_TLS: "true"
      MAIL_USERNAME: apikey
      MAIL_PASSWORD: ""
      MAIL_DEFAULT_SENDER: orders@example.com
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cafe_ordering
      POSTGRES_USER: cafe
      POSTGRES_PASSWORD: cafe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
