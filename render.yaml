# render.yaml — Cafe Ordering (Python / Flask / Gunicorn)
#
# Services:
#   cafe-ordering         Web  — Flask + Gunicorn
#   cafe-ordering-worker  Worker — RQ background jobs
#   cafe-ordering-redis   Redis  — sessions, rate-limit, RQ queues
#
# Database:
#   cafe-ordering-db      Managed PostgreSQL
#
# Required secrets (Render Dashboard → Environment):
#   SECRET_KEY             32+ random chars
#   BILLING_ENCRYPTION_KEY Fernet key
#   ADMIN_SECRET_KEY       Superadmin secret
#
# Optional secrets:
#   SENDGRID_API_KEY, MAIL_DEFAULT_SENDER
#   STRIPE_SECRET_KEY
#   RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET
#   VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_CLAIM_EMAIL
#   TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_FROM_NUMBER
#   SENTRY_DSN, OPS_HEALTH_TOKEN

databases:
  - name: cafe-ordering-db
    region: oregon
    plan: free
    databaseName: cafe_ordering
    user: cafe_user

services:

  # ── Managed Redis ───────────────────────────────────────────────────────────
  - type: redis
    name: cafe-ordering-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ── Web service (Flask / Gunicorn) ──────────────────────────────────────────
  - type: web
    name: cafe-ordering
    runtime: python
    region: oregon
    plan: free
    buildCommand: "pip install --no-cache-dir --upgrade pip && pip install --no-cache-dir -r requirements.txt"
    preDeployCommand: "bash scripts/release.sh"
    startCommand: "python start.py"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-ordering-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cafe-ordering-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: BILLING_ENCRYPTION_KEY
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CLAIM_EMAIL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: OPS_HEALTH_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false

  # ── RQ background worker ────────────────────────────────────────────────────
  - type: worker
    name: cafe-ordering-worker
    runtime: python
    region: oregon
    plan: free
    buildCommand: "pip install --no-cache-dir --upgrade pip && pip install --no-cache-dir -r requirements.txt"
    startCommand: "python rqworker.py"
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app
      - key: RQ_QUEUES
        value: default
      - key: WEBHOOK_RETRY_INTERVAL_SECS
        value: "300"
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-ordering-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cafe-ordering-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: BILLING_ENCRYPTION_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: SENTRY_DSN
        sync: false
