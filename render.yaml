services:
  - type: web
    name: cafe-ordering
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install --no-cache-dir -r requirements.txt
    preDeployCommand: bash scripts/release.sh
    startCommand: python start.py
    healthCheckPath: /healthz
    envVars:
      - key: FLASK_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: REDIS_URL
        sync: false
