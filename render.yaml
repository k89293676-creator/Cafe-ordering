# render.yaml — Full Render deployment for Cafe Ordering (Python / Flask / Gunicorn)
#
# Services declared here:
#   1. cafe-ordering        — Flask web app (Gunicorn + gevent)
#   2. cafe-ordering-worker — RQ background worker (webhook retry, jobs)
#   3. cafe-ordering-redis  — Managed Redis (sessions, rate-limit, RQ queues)
#
# Databases declared here:
#   1. cafe-ordering-db     — Managed PostgreSQL
#
# ── Required secrets (set in Render Dashboard → Environment) ────────────────
#   SECRET_KEY              32+ random chars — sessions & CSRF
#   BILLING_ENCRYPTION_KEY  Fernet key — payment credential encryption
#   ADMIN_SECRET_KEY        Superadmin bootstrap secret
#
# ── Optional secrets ────────────────────────────────────────────────────────
#   SENDGRID_API_KEY        Transactional email
#   MAIL_DEFAULT_SENDER     From-address for outgoing email
#   SENTRY_DSN              Error tracking
#   OPS_HEALTH_TOKEN        Bearer token for /api/ops/health
#   STRIPE_SECRET_KEY       Stripe payment gateway
#   RAZORPAY_KEY_ID         Razorpay payment gateway
#   RAZORPAY_KEY_SECRET     Razorpay payment gateway
#   VAPID_PUBLIC_KEY        Web-push notifications
#   VAPID_PRIVATE_KEY       Web-push notifications
#   VAPID_CLAIM_EMAIL       Web-push claim email (mailto:you@example.com)
#   TWILIO_ACCOUNT_SID      SMS notifications
#   TWILIO_AUTH_TOKEN       SMS notifications
#   TWILIO_FROM_NUMBER      SMS from-number

databases:
  - name: cafe-ordering-db
    region: oregon
    plan: free
    databaseName: cafe_ordering
    user: cafe_user

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: cafe-ordering-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []           # allow all Render services

  # ── Web (Flask / Gunicorn) ─────────────────────────────────────────────────
  - type: web
    name: cafe-ordering
    runtime: python
    region: oregon
    plan: free
    buildCommand: >-
      pip install --no-cache-dir --upgrade pip &&
      pip install --no-cache-dir -r requirements.txt
    preDeployCommand: bash scripts/release.sh
    startCommand: python start.py
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # ── Runtime ─────────────────────────────────────────────────────────────
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app
      - key: WEB_CONCURRENCY
        value: "2"

      # ── Wired from managed services ──────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-ordering-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cafe-ordering-redis
          type: redis
          property: connectionString

      # ── Required secrets (fill in Render Dashboard) ───────────────────────
      - key: SECRET_KEY
        sync: false
      - key: BILLING_ENCRYPTION_KEY
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false

      # ── Email ─────────────────────────────────────────────────────────────
      - key: SENDGRID_API_KEY
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false

      # ── Payments ──────────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # ── Push notifications ────────────────────────────────────────────────
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CLAIM_EMAIL
        sync: false

      # ── Monitoring & ops ──────────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false
      - key: OPS_HEALTH_TOKEN
        sync: false

      # ── SMS (optional) ────────────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false

  # ── RQ Background Worker ───────────────────────────────────────────────────
  - type: worker
    name: cafe-ordering-worker
    runtime: python
    region: oregon
    plan: free
    buildCommand: >-
      pip install --no-cache-dir --upgrade pip &&
      pip install --no-cache-dir -r requirements.txt
    startCommand: python rqworker.py
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app
      - key: RQ_QUEUES
        value: default
      - key: WEBHOOK_RETRY_INTERVAL_SECS
        value: "300"

      # ── Wired from managed services ──────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-ordering-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cafe-ordering-redis
          type: redis
          property: connectionString

      # ── Secrets shared with web ───────────────────────────────────────────
      - key: SECRET_KEY
        sync: false
      - key: BILLING_ENCRYPTION_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: SENTRY_DSN
        sync: false
