# render.yaml — Cafe Ordering (Python / Flask / Gunicorn) — Free Tier
#
# Key design decisions for free tier:
#   - No preDeployCommand (paid feature) — migrations run in startCommand
#   - SECRET_KEY auto-generated by Render (generateValue: true)
#   - ADMIN_SECRET_KEY auto-generated by Render (generateValue: true)
#   - startCommand uses semicolon (;) not && so gunicorn always starts
#     even if the migration script encounters a first-deploy timing issue
#
# Required secrets to set manually in Render Dashboard:
#   BILLING_ENCRYPTION_KEY  — Fernet key, generate with:
#     python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#
# Optional secrets (set as needed):
#   SENDGRID_API_KEY, MAIL_DEFAULT_SENDER   — transactional email
#   STRIPE_SECRET_KEY                        — Stripe payments
#   RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET    — Razorpay payments
#   VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_CLAIM_EMAIL — push notifications
#   TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_FROM_NUMBER — SMS
#   SENTRY_DSN                               — error tracking
#   OPS_HEALTH_TOKEN                         — /api/ops/health bearer token

databases:
  - name: cafe-ordering-db
    region: oregon
    plan: free
    databaseName: cafe_ordering
    user: cafe_user

services:

  # ── Managed Redis ────────────────────────────────────────────────────────────
  - type: redis
    name: cafe-ordering-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ── Web service (Flask / Gunicorn) ───────────────────────────────────────────
  - type: web
    name: cafe-ordering
    runtime: python
    region: oregon
    plan: free
    buildCommand: "pip install --no-cache-dir --upgrade pip && pip install --no-cache-dir -r requirements.txt"
    startCommand: "bash scripts/release.sh; python start.py"
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app
      - key: WEB_CONCURRENCY
        value: "2"
      # Auto-wired from managed services
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-ordering-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cafe-ordering-redis
          type: redis
          property: connectionString
      # Auto-generated by Render on first deploy (64-char random string)
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_SECRET_KEY
        generateValue: true
      # Must be set manually in Render Dashboard
      - key: BILLING_ENCRYPTION_KEY
        sync: false
      # Optional — set as needed
      - key: SENDGRID_API_KEY
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_GROWTH
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_CURRENCY
        value: "gbp"
      - key: GEMINI_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CLAIM_EMAIL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: OPS_HEALTH_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false

  # ── RQ background worker ──────────────────────────────────────────────────────
  - type: worker
    name: cafe-ordering-worker
    runtime: python
    region: oregon
    plan: free
    buildCommand: "pip install --no-cache-dir --upgrade pip && pip install --no-cache-dir -r requirements.txt"
    startCommand: "python rqworker.py"
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app
      - key: RQ_QUEUES
        value: default
      - key: WEBHOOK_RETRY_INTERVAL_SECS
        value: "300"
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-ordering-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cafe-ordering-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BILLING_ENCRYPTION_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: SENTRY_DSN
        sync: false
